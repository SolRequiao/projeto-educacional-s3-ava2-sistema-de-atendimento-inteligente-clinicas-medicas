version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: clinica_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: clinica

  backend:
    build:
      context: ./backend
    container_name: clinica_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: clinica_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data: